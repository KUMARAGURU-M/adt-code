spring.application.name=adt-production-report

# ================================================
# SERVER
# ================================================
server.port=${PORT:8080}
# context-path removed so React can load at the root (/) server.servlet.context-path=/api

# ================================================
# DATABASE
# ================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/adt_production}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ================================================
# JPA / HIBERNATE
# ================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ================================================
# FLYWAY
# ================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ================================================
# JWT
# ================================================
app.jwt.secret=${JWT_SECRET:ADTProductionReportSecretKey2026VeryLongAndSecureSecretKeyForJWT}
app.jwt.access-token-expiry=3600000
app.jwt.refresh-token-expiry=2592000000

# ================================================
# FILE UPLOAD
# ================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

app.file.upload-dir=uploads

# ================================================
# JACKSON
# ================================================
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.property-naming-strategy=SNAKE_CASE

# ================================================
# SWAGGER
# ================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ================================================
# LOGGING
# ================================================
logging.level.com.arrowdatatech=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO